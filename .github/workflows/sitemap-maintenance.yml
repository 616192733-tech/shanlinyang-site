name: Maintain sitemap

on:
  push:
    branches: [agent/seo-conversion-cleanup]
    paths:
      - "**.html"
      - "vercel.json"
      - "scripts/generate_sitemap.py"
      - ".github/workflows/sitemap-maintenance.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/seo-conversion-cleanup
          fetch-depth: 0
      - name: Generate sitemap
        run: python scripts/generate_sitemap.py
      - name: Commit updated sitemap
        run: |
          if git diff --quiet -- sitemap.xml; then
            echo "Sitemap already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git commit -m "Update sitemap from canonical pages"
          git push
