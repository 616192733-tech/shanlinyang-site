name: Contact page cleanup

on:
  push:
    branches: [agent/seo-conversion-cleanup]
    paths:
      - ".github/workflows/contact-cleanup.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/seo-conversion-cleanup
      - name: Apply contact page fixes
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          p = Path('contact.html')
          text = p.read_text(encoding='utf-8')
          text = text.replace('"email": "info@shanlinyang.com"', '"email": "616192733@qq.com"')
          text = text.replace("we'll reply from sales@ so you can attach files directly.", "we'll reply by email so you can attach files directly.")
          text = re.sub(
              r'(<!-- Google Analytics 4.*?-->)\s*<script type="application/ld\+json">\s*\{"@context":"https://schema.org","@type":"ContactPage".*?</script>',
              r'\1',
              text,
              count=1,
              flags=re.S,
          )
          p.write_text(text, encoding='utf-8')
          PY
      - name: Verify cleanup
        run: |
          test "$(grep -Ec '"@type"[[:space:]]*:[[:space:]]*"ContactPage"' contact.html)" -eq 1
          ! grep -q 'info@shanlinyang.com\|reply from sales@' contact.html
      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add contact.html
          git diff --cached --quiet && exit 0
          git commit -m "Clean up contact page metadata and email copy"
          git push
