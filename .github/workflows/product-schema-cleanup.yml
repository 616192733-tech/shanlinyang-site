name: Consolidate product FAQ schema

on:
  push:
    branches: [agent/seo-conversion-cleanup]
    paths:
      - ".github/workflows/product-schema-cleanup.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/seo-conversion-cleanup
      - name: Keep one visible FAQ schema per product page
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import re

          pattern = re.compile(
              r'<script[^>]+type=["\']application/ld\+json["\'][^>]*>.*?</script>\s*',
              re.I | re.S,
          )

          changed = []
          for path in sorted(Path('products').glob('*.html')):
              text = path.read_text(encoding='utf-8')
              faq_matches = []
              for match in pattern.finditer(text):
                  block = match.group(0)
                  payload = re.sub(r'^.*?>|</script>\s*$', '', block, flags=re.I | re.S)
                  try:
                      data = json.loads(payload)
                  except json.JSONDecodeError:
                      continue
                  if isinstance(data, dict) and data.get('@type') == 'FAQPage':
                      faq_matches.append(match)

              if len(faq_matches) <= 1:
                  continue

              # The first FAQ block mirrors the visible FAQ section on these pages.
              for match in reversed(faq_matches[1:]):
                  text = text[:match.start()] + text[match.end():]
              path.write_text(text, encoding='utf-8')
              changed.append(f'{path}: {len(faq_matches)} -> 1 FAQPage block')

          print('\n'.join(changed) if changed else 'No duplicate FAQ schema found')
          PY
      - name: Verify schema consolidation
        run: |
          python scripts/seo_audit.py
          python - <<'PY'
          from pathlib import Path
          import re
          for path in Path('products').glob('*.html'):
              text = path.read_text(encoding='utf-8')
              count = len(re.findall(r'"@type"\s*:\s*"FAQPage"', text))
              if count > 1:
                  raise SystemExit(f'{path}: still has {count} FAQPage blocks')
          PY
      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add products scripts/seo_audit.py
          git diff --cached --quiet && exit 0
          git commit -m "Consolidate duplicate product FAQ schema"
          git push
