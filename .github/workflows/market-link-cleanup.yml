name: Link regional market hub

on:
  push:
    branches: [agent/seo-conversion-cleanup]
    paths:
      - ".github/workflows/market-link-cleanup.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-homepage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/seo-conversion-cleanup
      - name: Add homepage market link and repair stray CSS
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          marker = '        <li><a href="/case-studies.html">Cases</a></li>'
          replacement = '        <li><a href="/markets/">Markets</a></li>\n' + marker
          if text.count(marker) != 1:
              raise SystemExit(f'Expected one homepage Cases nav marker, found {text.count(marker)}')
          if '<li><a href="/markets/">Markets</a></li>' not in text:
              text = text.replace(marker, replacement, 1)
          text = text.replace('\n.6rem}\n}\n\n</style>', '\n\n</style>')
          path.write_text(text, encoding='utf-8')
          PY
      - name: Verify homepage changes
        run: |
          grep -q '<li><a href="/markets/">Markets</a></li>' index.html
          ! grep -q '^\.6rem}' index.html
          python scripts/seo_audit.py
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m "Link regional market hub from homepage"
          git push
