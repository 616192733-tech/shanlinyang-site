name: Normalize product and organization schema

on:
  push:
    branches: [agent/seo-conversion-cleanup]
    paths:
      - ".github/workflows/product-schema-normalize.yml"
      - "scripts/normalize_schema.py"
  workflow_dispatch:

concurrency:
  group: schema-normalize-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/seo-conversion-cleanup
      - name: Normalize structured data
        run: python scripts/normalize_schema.py
      - name: Verify SEO
        run: python scripts/seo_audit.py
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html products
          git diff --cached --quiet && exit 0
          git commit -m "Normalize product and organization structured data"
          git push
