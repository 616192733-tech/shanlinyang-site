name: SEO audit

on:
  push:
    branches: [main, agent/seo-conversion-cleanup]
  workflow_dispatch:

concurrency:
  group: seo-audit-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Audit HTML and sitemap
        run: python scripts/seo_audit.py
