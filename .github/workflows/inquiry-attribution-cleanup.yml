name: Add inquiry source attribution

on:
  push:
    branches: [agent/seo-conversion-cleanup]
    paths:
      - ".github/workflows/inquiry-attribution-cleanup.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  attribution:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/seo-conversion-cleanup
      - name: Add market and referrer attribution
        run: |
          python - <<'PY'
          from pathlib import Path

          contact = Path('contact.html')
          text = contact.read_text(encoding='utf-8')

          subject = '  <input type="hidden" name="subject" value="New inquiry from shanlinyang.com">'
          fields = subject + '''
          <input type="hidden" name="source_page" id="source-page" value="direct">
          <input type="hidden" name="source_market" id="source-market" value="unspecified">
          <input type="hidden" name="landing_page" id="landing-page" value="/contact.html">'''
          if 'id="source-page"' not in text:
              if text.count(subject) != 1:
                  raise SystemExit('contact.html: expected subject field not found exactly once')
              text = text.replace(subject, fields, 1)

          script_marker = "(function(){var f=document.querySelector('form.inquiry');if(!f)return;"
          attribution = script_marker + "\n" + (
              "var p=new URLSearchParams(location.search);"
              "document.getElementById('source-page').value=document.referrer||'direct';"
              "document.getElementById('source-market').value=p.get('market')||'unspecified';"
              "document.getElementById('landing-page').value=location.pathname+location.search;"
          )
          if "p.get('market')" not in text:
              if text.count(script_marker) != 1:
                  raise SystemExit('contact.html: inquiry script marker not found exactly once')
              text = text.replace(script_marker, attribution, 1)

          success_marker = "if(j.success){\n"
          success_event = success_marker + (
              "window.dataLayer=window.dataLayer||[];"
              "window.dataLayer.push({event:'generate_lead',form_name:'quote_request',"
              "source_market:document.getElementById('source-market').value});\n"
          )
          if "event:'generate_lead'" not in text:
              if text.count(success_marker) != 1:
                  raise SystemExit('contact.html: success marker not found exactly once')
              text = text.replace(success_marker, success_event, 1)

          catch_marker = ".catch(function(){b.disabled=false;b.textContent=o;"
          catch_event = catch_marker + (
              "window.dataLayer=window.dataLayer||[];"
              "window.dataLayer.push({event:'form_error',form_name:'quote_request'});"
          )
          if "event:'form_error'" not in text:
              if text.count(catch_marker) != 1:
                  raise SystemExit('contact.html: failure marker not found exactly once')
              text = text.replace(catch_marker, catch_event, 1)

          contact.write_text(text, encoding='utf-8')

          market_codes = {
              'markets/us-clothing-manufacturer.html': 'us',
              'markets/canada-clothing-manufacturer.html': 'canada',
              'markets/europe-clothing-manufacturer.html': 'europe',
          }
          for filename, market in market_codes.items():
              path = Path(filename)
              page = path.read_text(encoding='utf-8')
              page = page.replace('href="/contact.html"', f'href="/contact.html?market={market}"')
              path.write_text(page, encoding='utf-8')
          PY
      - name: Verify attribution fields and links
        run: |
          grep -q 'id="source-page"' contact.html
          grep -q "event:'generate_lead'" contact.html
          grep -q "event:'form_error'" contact.html
          grep -q 'contact.html?market=us' markets/us-clothing-manufacturer.html
          grep -q 'contact.html?market=canada' markets/canada-clothing-manufacturer.html
          grep -q 'contact.html?market=europe' markets/europe-clothing-manufacturer.html
          python scripts/seo_audit.py
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add contact.html markets
          git diff --cached --quiet && exit 0
          git commit -m "Add market attribution to quote inquiries"
          git push
